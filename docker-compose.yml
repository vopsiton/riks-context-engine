version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riks-sandbox
    environment:
      - ENVIRONMENT=development
      - DATA_DIR=/app/data
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - riks-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  riks-dev:
    driver: bridge
