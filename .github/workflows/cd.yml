# Continuous Delivery Pipeline
# 1. Test on every push/PR
# 2. Build Docker image on merge to master
# 3. Deploy to staging on every push to master
# 4. Deploy to production on release tags

name: CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.12"

jobs:
  # ===== Stage 1: Quality Gates ===== #
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Check ruff format
        run: ruff format --check src/ tests/

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy src/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=src/ --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: vars.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ vars.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ===== Stage 2: Docker Build ===== #
  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=pr,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=,suffix=-${{ github.sha }},event=workflow

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ===== Stage 3: Deploy to Staging (Master Push) ===== #
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref_name == 'master'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=staging-

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging server
        if: vars.STAGING_SERVER_HOST != ''
        env:
          STAGING_HOST: ${{ vars.STAGING_SERVER_HOST }}
          STAGING_USER: ${{ vars.STAGING_SERVER_USER }}
        run: |
          echo "Deploying to staging: $STAGING_HOST"
          echo "${{ secrets.STAGING_SSH_KEY }}" > deploy_key
          chmod 600 deploy_key

          ssh -o StrictHostKeyChecking=no \
              -i deploy_key \
              $STAGING_USER@$STAGING_HOST \
              'cd /opt/riks-context-engine && \
               git pull origin master && \
               docker pull ghcr.io/${{ github.repository }}:staging-${{ github.sha }} && \
               docker-compose up -d app && \
               docker image prune -f'

          rm deploy_key

      - name: Health check staging
        if: vars.STAGING_API_URL != ''
        run: |
          sleep 5
          curl -f "${{ vars.STAGING_API_URL }}/health" || exit 1

      - name: Run integration tests against staging
        if: vars.STAGING_API_URL != ''
        run: |
          pip install -e ".[dev]"
          pytest tests/test_api.py -v --base-url="${{ vars.STAGING_API_URL }}"

  # ===== Stage 4: Deploy to Production (Release) ===== #
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'release'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            latest

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > deploy_key
          chmod 600 deploy_key

          ssh -o StrictHostKeyChecking=no \
              -i deploy_key \
              $SERVER_USER@$SERVER_HOST \
              'cd /opt/riks-context-engine && \
               git pull origin master && \
               docker-compose pull && \
               docker-compose up -d && \
               docker image prune -f'

          rm deploy_key

      - name: Production health check
        run: |
          sleep 10
          curl -f "https://${{ secrets.PRODUCTION_DOMAIN }}/health" || exit 1

  # ===== Stage 5: Notify on Completion ===== #
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, docker-build]
    if: always()
    steps:
      - name: Build status summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
