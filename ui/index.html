<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rik Context Engine - Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; 
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
        }
        header h1 { font-size: 1.2rem; color: #e94560; }
        header small { color: #888; font-size: 0.8rem; }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
        }
        .message.user {
            background: #e94560;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        .message.ai {
            background: #16213e;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        .message.error {
            background: #ff4444;
            color: white;
        }
        .typing {
            color: #888;
            font-style: italic;
        }
        #input-area {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #0f3460;
        }
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 25px;
            background: #1a1a2e;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        #sendBtn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #sendBtn:hover { background: #ff6b6b; }
        #sendBtn:disabled { background: #555; cursor: not-allowed; }
        .model-select {
            background: #1a1a2e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>🗿 Rik Context Engine</h1>
        <small id="status">Bağlanıyor...</small>
    </header>
    <div id="chat"></div>
    <div id="input-area">
        <select id="modelSelect" class="model-select">
            <option value="qwen3.5-9b">Qwen 3.5</option>
            <option value="gemma4-31b-it">Gemma 4</option>
        </select>
        <input type="text" id="messageInput" placeholder="Mesajınızı yazın..." />
        <button id="sendBtn">Gönder</button>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let models = [];
        
        const chat = document.getElementById('chat');
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        const modelSelect = document.getElementById('modelSelect');

        async function checkHealth() {
            try {
                const res = await fetch(`${API_URL}/health`);
                const data = await res.json();
                status.textContent = `✅ ${data.status || 'Çalışıyor'} | API: ${API_URL}`;
            } catch {
                status.textContent = '❌ API bağlantısı yok';
            }
        }

        async function loadModels() {
            try {
                const res = await fetch(`${API_URL}/api/chat/models`);
                const data = await res.json();
                models = data.models || [];
                status.textContent = `✅ ${models.length} model yüklü | ${API_URL}`;
            } catch {
                status.textContent = '⚠️ Modeller yüklenemedi';
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function addTyping() {
            const div = document.createElement('div');
            div.className = 'message ai typing';
            div.id = 'typing';
            div.textContent = 'Yazıyor...';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, 'user');
            input.value = '';
            sendBtn.disabled = true;
            
            const typing = addTyping();
            const model = modelSelect.value;
            
            try {
                const res = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, model })
                });
                const data = await res.json();
                typing.remove();
                
                if (data.error) {
                    addMessage(`Hata: ${data.error}`, 'error');
                } else {
                    addMessage(data.response || data.message || JSON.stringify(data), 'ai');
                }
            } catch (err) {
                typing.remove();
                addMessage(`Bağlantı hatası: ${err.message}`, 'error');
            }
            
            sendBtn.disabled = false;
            input.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        checkHealth();
        loadModels();
    </script>
</body>
</html>
